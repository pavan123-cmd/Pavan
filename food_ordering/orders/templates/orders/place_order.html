{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Your Order</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: url("{% static 'orders/images/bg.jpeg' %}") no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1d1b1c;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        header .navbar {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: white;
        }
        nav a {
            text-decoration: none;
            color: white;
            margin: 0 10px;
            background-color: #007BFF;
            padding: 5px 10px;
            border-radius: 5px;
        }
        nav a:hover {
            background-color: #0056b3;
        }
        .container {
            background: #fff;
            padding: 20px;
            margin: 30px auto;
            max-width: 700px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input, select, textarea, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #007BFF;
            color: white;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        #success-message {
            display: none;
            text-align: center;
        }
        #new-form {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <h1><img src="{% static 'orders/images/logo.jpeg' %}" alt="Logo" width="60"> UP Food and Restaurant</h1>
            <nav>
                <a href="/">Menu</a>
                <a href="/cart/">View Cart</a>
                <a href="/place_order/">Place Order</a>
                <a href="/admin/">Admin</a>
            </nav>
        </div>
    </header>

    <div class="container" id="order-form-section">
        <h2>Place Your Order</h2>
        <form id="order-form" onsubmit="return handleOrderSubmit(event)">
            {% csrf_token %}
            <label for="email">Email</label>
            <input type="email" id="email" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" required pattern="\d{10}" maxlength="10">

            <label for="address">Delivery Address</label>
            <textarea id="address" rows="3" required></textarea>

            <label for="payment_method">Payment Method</label>
            <select id="payment_method" required>
                <option value="">-- Select --</option>
                <option value="debit">Debit Card</option>
                <option value="credit">Credit Card</option>
                <option value="upi">UPI</option>
            </select>

            <div id="card-section" style="display: none;">
                <label for="card_number">Card Number</label>
                <input type="text" id="card_number" maxlength="12" placeholder="12-digit card number">

                <label for="cvv">CVV</label>
                <input type="text" id="cvv" maxlength="3" placeholder="3-digit CVV">
            </div>

            <div id="upi-section" style="display: none;">
                <label for="upi_id">UPI ID</label>
                <input type="text" id="upi_id" maxlength="14" placeholder="14-digit UPI ID">
            </div>

            <button type="submit">Place Order</button>
        </form>
    </div>

    <div class="container" id="success-message">
        <h2>🎉 Order Placed Successfully!</h2>
        <p>Thank you! Your order has been placed.</p>

        <div id="new-form">
            <h3>Feedback Form</h3>
            <form onsubmit="return handleFeedbackSubmit(event)">
                <label for="feedback_name">Your Name</label>
                <input type="text" id="feedback_name" required>

                <label for="feedback">Feedback</label>
                <textarea id="feedback" rows="4" placeholder="Share your thoughts..." required></textarea>

                <button type="submit">Submit Feedback</button>
            </form>
        </div>
    </div>

    <script>
        const paymentMethod = document.getElementById("payment_method");
        const cardSection = document.getElementById("card-section");
        const upiSection = document.getElementById("upi-section");

        paymentMethod.addEventListener("change", function () {
            cardSection.style.display = (this.value === "debit" || this.value === "credit") ? "block" : "none";
            upiSection.style.display = (this.value === "upi") ? "block" : "none";
        });

        function handleOrderSubmit(event) {
            event.preventDefault();
            const method = paymentMethod.value;
            const cardNumber = document.getElementById("card_number").value.trim();
            const cvv = document.getElementById("cvv").value.trim();
            const upi = document.getElementById("upi_id").value.trim();

            if (method === "debit" || method === "credit") {
                if (!/^\d{12}$/.test(cardNumber)) {
                    alert("Card number must be 12 digits.");
                    return false;
                }
                if (!/^\d{3}$/.test(cvv)) {
                    alert("CVV must be 3 digits.");
                    return false;
                }
            } else if (method === "upi") {
                if (!/^\d{14}$/.test(upi)) {
                    alert("UPI ID must be 14 digits.");
                    return false;
                }
            }

            // Simulate successful submission
            document.getElementById("order-form-section").style.display = "none";
            document.getElementById("success-message").style.display = "block";
            document.getElementById("new-form").style.display = "block";
            return false;
        }

        function handleFeedbackSubmit(event) {
            event.preventDefault();
            const name = document.getElementById("feedback_name").value;
            const message = document.getElementById("feedback").value;
            alert(`Thank you for your feedback, ${name}!`);
            event.target.reset();
            return false;
        }
    </script>
</body>
</html>
